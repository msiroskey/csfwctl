name: mac-baseline
platform: mac
status: enabled
description: Baseline allow/deny rules for macOS endpoints.

rules:
  - name: Allow established inbound
    enabled: true
    action: allow
    direction: inbound
    protocol: tcp
    state: established
    locations: [any]

  - name: Allow updater outbound
    enabled: true
    action: allow
    direction: outbound
    protocol: tcp
    file_path: /Applications/abc01-agent.app/Contents/MacOS/*
    remote:
      ports: [443]
    locations: [any]
