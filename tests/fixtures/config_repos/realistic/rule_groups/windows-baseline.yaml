name: windows-baseline
platform: windows
status: enabled
description: Baseline allow/deny rules for Windows endpoints.

rules:
  - name: Allow established inbound
    enabled: true
    action: allow
    direction: inbound
    protocol: tcp
    state: established
    locations: [any]

  - name: Block SMB inbound from non-corp
    enabled: true
    action: block
    direction: inbound
    protocol: tcp
    local:
      ports: [445]
    remote:
      addresses_negated: true
      addresses: [10.0.0.0/8]
    locations: [any]

  - name: Allow updater outbound
    enabled: true
    action: allow
    direction: outbound
    protocol: tcp
    file_path: C:\Program Files\abc01-agent\*.exe
    remote:
      ports: [443]
    locations: [any]

  - name: Allow DHCP service outbound
    enabled: true
    action: allow
    direction: outbound
    protocol: udp
    file_path: '%SystemRoot%\System32\svchost.exe'
    service_name: Dhcp
    remote:
      ports: [67]
    locations: [any]
